<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動滿意度調查_Template</title>
    <style>
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center; 
            background-color: #747373; 
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        
        .main-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
        }

       
        h1, .center-img {
            align-self: center;
            text-align: center;
        }

        
        h1 { color: #81c784; }

        
        .center-img {
            display: block;
            margin: 0 auto 20px auto;
            width: 80%; 
        }

        
        .option-box, .job-option {
            border: 2px solid #81c784;
            background-color: #ffffff;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: block;
            width: 250px;
        }

        .option-box:hover, .job-option:hover {
            background-color: #f1f8e9;
        }

        #extra-question {
            display: none;
            margin-top: 15px;
            padding: 10px;
            border-left: 5px solid #81c784;
            background-color: #f9f9f9;
            width: 100%;
        }

        
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #81c784;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical; 
            min-height: 100px;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            background-color: #f1f8e9;
        }

        
        .submit-btn {
            background-color: #81c784;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            align-self: center;
            margin-top: 30px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background-color: #65c069;
        }
    </style>
</head>
<body>

<div class="main-container">
    <img src="events-satisfaction-survey-1.jpg" class="center-img">
    
    <h1>活動滿意度調查_Template</h1>

    <h2>個人調查</h2>
    
    <h2>1 性別</h2>
    <label><input type="radio" name="gender" value="1" checked>生理男</label><br>
    <label><input type="radio" name="gender" value="2">生理女</label><br> 
    <label><input type="radio" name="gender" value="3">多元性別</label>

    <h2>2 年齡</h2>
    <select name="age" required style="width: 200px; height: 40px; background-color: #ffffff; border: 2px solid #65c069; border-radius: 5px; font-size: 16px;">
        <option value="" selected>請選擇</option>
        <option value="1">18 歲以下</option>
        <option value="2">19-23歲</option>
        <option value="3">24-28歲</option>
        <option value="4">29-33歲</option>
        <option value="5">34-38歲</option>
        <option value="6">39-43歲</option>
        <option value="7">44-48歲</option>
        <option value="8">49歲以上</option>
    </select>

    <h2>3 是否有攜伴入場</h2>
    <div class="option-box">
        <label><input type="radio" name="choice" id="yes" value="1" onclick="toggleNewQuestion()"> 是</label>
    </div>
    <div class="option-box">
        <label><input type="radio" name="choice" id="no" value="0" onclick="toggleNewQuestion()"> 否</label>
    </div>

    <div id="extra-question">
        <h2>4 包含您在內，當天總共是幾位到場呢？</h2>
        <input type="text" name="reason" placeholder="請輸入...人" style="width: 80%; padding: 8px;">
    </div>

    <h2>5 您的職業別</h2>
    <label class="job-option"><input type="radio" name="job" value="1"> 學生</label>
    <label class="job-option"><input type="radio" name="job" value="2"> 教師</label>
    <label class="job-option"><input type="radio" name="job" value="3"> 補教業者</label>
    <label class="job-option"><input type="radio" name="job" value="4"> 藝術創作者</label>
    <label class="job-option"><input type="radio" name="job" value="4"> 建築工程師</label>
    <label class="job-option"><input type="radio" name="job" value="4"> 媒體相關</label>
    <label class="job-option"><input type="radio" name="job" value="4"> 家庭主婦</label>
    <label class="job-option"><input type="radio" name="job" value="4"> 公務員</label>
    <label class="job-option"><input type="radio" name="job" value="9"> 其他職業類別</label>

    
    <h2>6 您有什麼想問的問題或建議嗎？</h2>
    <textarea name="user_question" placeholder="請在此輸入您的問題..."></textarea>

    <!-- 提交按鈕 -->
    <button type="submit" class="submit-btn">送出</button>

</div>

<script>
    function toggleNewQuestion() {
        var isYes = document.getElementById("yes").checked;
        var box = document.getElementById("extra-question");
        box.style.display = isYes ? "block" : "none";
    }
</script>

</body>
</html>
